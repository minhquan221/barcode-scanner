<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barcode Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
}

.header{
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
background:#1e293b;
box-shadow:0 2px 5px rgba(0,0,0,0.3);
}

.container{
padding:15px;
max-width:500px;
margin:auto;
}

#reader{
border-radius:12px;
overflow:hidden;
border:3px solid #22c55e;
}

.scan-box{
position:relative;
margin-top:10px;
}

.scan-line{
position:absolute;
width:100%;
height:3px;
background:#22c55e;
animation:scan 2s infinite;
}

@keyframes scan{
0%{top:0}
100%{top:100%}
}

.result{
margin-top:15px;
background:#1e293b;
padding:15px;
border-radius:10px;
font-size:18px;
word-break:break-all;
}

.buttons{
display:flex;
gap:10px;
margin-top:10px;
}

button{
flex:1;
padding:12px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
}

.start{
background:#22c55e;
color:white;
}

.stop{
background:#ef4444;
color:white;
}

.history{
margin-top:20px;
}

.history h3{
margin-bottom:10px;
}

.item{
background:#1e293b;
padding:10px;
margin-bottom:8px;
border-radius:8px;
font-size:14px;
}

</style>
</head>

<body>

<div class="header">
📦 Barcode Scanner
</div>

<div class="container">

<div class="scan-box">

<div id="reader"></div>

<div class="scan-line"></div>

</div>

<div class="result" id="result">
Chưa scan
</div>

<div class="buttons">

<button class="start" onclick="startScan()">Start</button>

<button class="stop" onclick="stopScan()">Stop</button>

</div>

<div class="history">

<h3>Lịch sử scan</h3>

<div id="history"></div>

</div>

</div>

<script>

let scanner;
let history=[];

function beep(){
const audio=new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
audio.play();
}

function vibrate(){
if(navigator.vibrate){
navigator.vibrate(200);
}
}

function addHistory(code){

history.unshift(code);

if(history.length>10) history.pop();

let html="";

history.forEach(c=>{
html+=`<div class="item">${c}</div>`;
});

document.getElementById("history").innerHTML=html;
}

function onScanSuccess(decodedText){

document.getElementById("result").innerText=decodedText;

navigator.clipboard.writeText(decodedText);

beep();

vibrate();

addHistory(decodedText);
}

function startScan(){

scanner=new Html5Qrcode("reader");

scanner.start(
{ facingMode:"environment" },
{
fps:10,
qrbox:250
},
onScanSuccess
);

}

function stopScan(){

if(scanner){

scanner.stop();

}

}

</script>

</body>
</html>
